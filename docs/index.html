<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#3a4b8c" />
  <title>Ceaslovnic · Player</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="css/chi-rho.png" />
  <link rel="icon" href="css/chi-rho.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="player">
  <main class="frame-wrap">
    <iframe id="player-frame"
            title="Ceaslovnic"
            src="about:blank"
            sandbox="allow-same-origin allow-scripts"
            referrerpolicy="no-referrer"></iframe>
  </main>

  <aside class="status-bar" role="status" aria-live="polite">
    <span class="status-cell status-now" id="status-now">—</span>
    <span class="status-cell status-slot" id="status-slot">—</span>
    <span class="status-cell status-next" id="status-next">—</span>
    <button id="install-btn" type="button" class="fs-btn" title="Instalează aplicația" hidden>⬇ Instalează</button>
    <button id="notif-btn" type="button" class="fs-btn" title="Activează notificările pentru fiecare ceas" aria-label="Activează notificările">🔕</button>
    <button id="fs-btn" type="button" class="fs-btn" title="Comutare ecran complet" aria-label="Comutare ecran complet">⛶</button>
  </aside>

  <script src="js/schedule.js"></script>
  <script src="js/player.js"></script>
</body>
</html>
